title = "Custom Gitleaks Rules"

[[rules]]
id = "fake-api-key"
description = "Fake API key detected"
regex = '''fake_api_key_[A-Za-z0-9_]+'''
secretGroup = 0

[[rules]]
id = "hardcoded-password"
description = "Hardcoded password detected"
regex = '''DB_PASSWORD\s*=\s*["'][^"']+["']'''
secretGroup = 0

[[rules]]
id = "aws-access-key-test"
description = "AWS Access Key detected"
regex = '''AKIA[0-9A-Z]{16}'''
secretGroup = 0 